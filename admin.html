<!doctype html>
<html lang="ka">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — GRT</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/webp" href="assets/logo.webp" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="noise"></div>

    <div class="admin-wrap">
      <!-- LOGIN VIEW -->
      <div class="admin-panel" id="login-panel">
        <h2>ადმინისტრატორის შესვლა</h2>
        <p class="sub">მხოლოდ ავტორიზებული მომხმარებლებისთვის.</p>
        <div class="admin-field">
          <label>ელ-ფოსტა</label>
          <input type="email" id="login-email" autocomplete="username" />
        </div>
        <div class="admin-field">
          <label>პაროლი</label>
          <input
            type="password"
            id="login-password"
            autocomplete="current-password"
          />
        </div>
        <button
          class="btn btn-primary"
          id="login-btn"
          style="width: 100%; justify-content: center"
        >
          შესვლა →
        </button>
        <div class="admin-msg error" id="login-msg"></div>
      </div>

      <!-- DASHBOARD VIEW -->
      <div id="dashboard" style="display: none">
        <button class="admin-logout" id="logout-btn">გამოსვლა</button>
        <div class="admin-panel" style="margin-bottom: 24px">
          <h2>ახალი პოსტი</h2>
          <p class="sub">შეავსეთ ინფორმაცია და გამოაქვეყნეთ საიტზე.</p>

          <div class="admin-field">
            <label>სათაური</label>
            <input type="text" id="post-title" />
          </div>
          <div class="admin-field">
            <label>ტექსტი</label>
            <textarea id="post-body"></textarea>
          </div>
          <div class="admin-field">
            <label>სურათი (არასავალდებულო)</label>
            <input type="file" id="post-image" accept="image/*" />
          </div>
          <div class="admin-field">
            <label>PDF ფაილი (არასავალდებულო)</label>
            <input type="file" id="post-pdf" accept="application/pdf" />
          </div>
          <button
            class="btn btn-primary"
            id="publish-btn"
            style="width: 100%; justify-content: center"
          >
            გამოქვეყნება
          </button>
          <div class="admin-msg" id="publish-msg"></div>
        </div>

        <div class="admin-panel">
          <h2>გამოქვეყნებული პოსტები</h2>
          <div class="admin-posts-list" id="posts-list">
            <div class="admin-msg">იტვირთება...</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/supabase-config.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
